<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가까운 조정위원회 찾기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #map { width: 100%; height: 400px; margin-top: 20px; background-color: #eee; border: 1px solid #ccc; }
        #result { margin-top: 15px; }
        .info-box { padding: 15px; border: 2px solid #007bff; border-radius: 10px; background: #f8f9fa; }
        input { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>우리집에서 가까운 조정위원회 찾기</h1>
    <p>주소를 입력하면 가장 가까운 위원회를 계산해 드립니다.</p>
    
    <input type="text" id="address" placeholder="예: 대구 동구 신서동" onkeypress="if(event.keyCode==13) findNearest()">
    <button onclick="findNearest()">찾기</button>
    
    <div id="result">결과가 여기에 표시됩니다.</div>
    <div id="map"></div>

   <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4da8cb17ef81b1cbfb11f06b1e77e43f&libraries=services"></script>

    <script>
    // 1. 위원회 데이터 (대구 지역 정밀 좌표)
    const locations =  [
    {name:"한국부동산원 서울동부지사", type:"부동산원", covers:["서울", "도봉구", "강북구", "노원구", "성북구", "중랑구", "동대문구", "성동구", "광진구", "강동구"], lat:37.557698, lng:127.079226, phone:"02-3394-9870~3", address:"서울시 광진구 천호대로 549, 지타워 10층"},
    {name:"한국부동산원 고양지사", type:"부동산원", covers:["경기"], lat:37.652619, lng:126.776883, phone:"031-902-3573~5", address:"경기도 고양시 일산동구 중앙로 1187, 흥국생명빌딩 8층"},
    {name:"한국부동산원 성남지사", type:"부동산원", covers:["경기"], lat:37.411158, lng:127.128242, phone:"031-8017-8488~90", address:"경기도 성남시 분당구 야탑로 81번길 16"},
    {name:"한국부동산원 인천지사", type:"부동산원", covers:["인천"], lat:37.401035, lng:126.712020, phone:"032-429-7041~6", address:"인천시 남동구 논현로 46번길 23, 7층"},
    {name:"한국부동산원 춘천지사", type:"부동산원", covers:["강원"], lat:37.883425, lng:127.729908, phone:"033-244-9793~4", address:"강원도 춘천시 중앙로 16, 무림빌딩 7층"},
    {name:"한국부동산원 대전지사", type:"부동산원", covers:["세종", "대전"], lat:36.508069, lng:127.261123, phone:"044-868-8341", address:"세종시 한누리대로 499, 세종포스트빌딩 302호"},
    {name:"한국부동산원 전주지사", type:"부동산원", covers:["전북"], lat:35.837688, lng:127.131437, phone:"063-276-8022~3", address:"전북 전주시 덕진구 기린대로 405, 한화생명빌딩 3층"},
    {name:"한국부동산원 포항지사", type:"부동산원", covers:["경북"], lat:36.030918, lng:129.366140, phone:"054-275-9771~2", address:"경북 포항시 북구 중앙로 201, 한화생명빌딩 8층"},
    {name:"한국부동산원 울산지사", type:"부동산원", covers:["울산"], lat:35.53823, lng:129.31132, phone:"052-224-8872~4", address:"울산시 남구 북부순환대로 17, 남운프라자 906호"},
    {name:"한국부동산원 창원지사", type:"부동산원", covers:["경남"], lat:35.218066, lng:128.675982, phone:"055-289-0136~8", address:"창원시 성산구 중앙대로 32, 2층"},
    {name:"한국토지주택공사 충북본부", type:"주택공사", covers:["충북"], lat:36.614249, lng:127.450780, phone:"043-905-1784", address:"충북 청주시 서원구 구룡산로 52번길 2, 303호"},
    {name:"한국토지주택공사 제주본부", type:"주택공사", covers:["제주"], lat:33.505062, lng:126.525532, phone:"064-901-3802", address:"제주시 중앙로 150, 대한항공제주사옥 3층"},
    {name:"대한법률구조공단 서울중앙지부", type:"대법공", covers:["서울", "금천구", "관악구", "동작구", "서초구", "강남구", "송파구"], lat:37.494383, lng:127.013104, phone:"02-6941-3430", address:"서울시 서초구 법원로 2길 21, 칠보빌딩 1층"},
    {name:"대한법률구조공단 수원지부", type:"대법공", covers:["경기", "인천"], lat:37.277533, lng:127.049515, phone:"031-8007-3430", address:"경기도 수원시 영통구 월드컵로 150번길 10, YM빌딩 3층"},
    {name:"대한법률구조공단 대전지부", type:"대법공", covers:["대전", "세종", "충남", "충북"], lat:36.356309, lng:127.387871, phone:"042-721-3430", address:"대전시 서구 둔산북로 121, 1층 117~121호"},
    {name:"대한법률구조공단 대구지부", type:"대법공", covers:["대구", "경북"], lat:35.859195, lng:128.631891, phone:"053-710-3430", address:"대구시 수성구 달구벌대로 2461, 디에스라이프빌딩 3층"},
    {name:"대한법률구조공단 부산지부", type:"대법공", covers:["부산", "울산", "경남"], lat:35.190787, lng:129.074010, phone:"051-711-3430", address:"부산시 연제구 법원남로 15번길 4, 성신프라이어빌딩 5층"},
    {name:"대한법률구조공단 광주지부", type:"대법공", covers:["광주", "전남", "전북", "제주"], lat:35.149140, lng:126.848917, phone:"062-710-3430", address:"광주시 서구 상무중앙로 28번길 4, 세진빌딩 4층 401호"},
    {name:"서울시청 (지자체)", type:"지자체", covers:["서울", "강서구", "은평구", "종로구", "서대문구", "마포구", "영등포구", "양천구", "구로구"], lat:37.564554, lng:126.975613, phone:"02-2133-1200~8", address:"서울시 중구 덕수궁길 15, 서울시청 서소문별관"}
];

    // 2. 거리 계산 함수
    function getDistance(lat1, lng1, lat2, lng2) {
        const r = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // 3. 찾기 실행 함수
    function findNearest() {
        const address = document.getElementById('address').value;
        if (!address) {
            alert("주소를 입력해주세요!");
            return;
        }

        // [진단] 카카오 라이브러리 로드 체크
        if (typeof kakao === 'undefined' || !kakao.maps || !kakao.maps.services) {
            alert("❌ 카카오 지도를 불러오지 못했습니다!\n\n원인 확인:\n1. 카카오 개발자 센터에 '도메인' 등록이 안 됨\n2. 등록한 도메인이 현재 접속 주소와 다름\n3. 사용 중인 키가 'JavaScript 키'가 아님");
            return;
        }

        const geocoder = new kakao.maps.services.Geocoder();

        geocoder.addressSearch(address, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const userLat = parseFloat(result[0].y);
                const userLng = parseFloat(result[0].x);
                const userPos = new kakao.maps.LatLng(userLat, userLng);

                let nearest = null;
                let minDistance = Infinity;

                locations.forEach(loc => {
                    const dist = getDistance(userLat, userLng, loc.lat, loc.lng);
                    if (dist < minDistance) {
                        minDistance = dist;
                        nearest = loc;
                    }
                });

                // 결과 출력
                document.getElementById('result').innerHTML = `
                    <div class="info-box">
                        <h3 style="margin-top:0; color:#007bff;">✅ 가장 가까운 곳: ${nearest.name}</h3>
                        <p>직선 거리: 약 <b>${minDistance.toFixed(2)}km</b></p>
                        <p>주소: ${nearest.address}</p>
                        <a href="https://map.kakao.com/link/to/${nearest.name},${nearest.lat},${nearest.lng}" target="_blank" style="color:blue; font-weight:bold;">[카카오맵 길찾기]</a>
                    </div>
                `;
                
                // 지도 업데이트
                const mapContainer = document.getElementById('map');
                const mapOption = { center: userPos, level: 6 };
                const map = new kakao.maps.Map(mapContainer, mapOption);
                
                // 마커 표시
                new kakao.maps.Marker({ position: userPos, map: map }); // 내 위치
                
                const targetPos = new kakao.maps.LatLng(nearest.lat, nearest.lng);
                const imageSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"; 
                const markerImage = new kakao.maps.MarkerImage(imageSrc, new kakao.maps.Size(24, 35));
                new kakao.maps.Marker({ position: targetPos, map: map, image: markerImage }); // 위원회 위치

            } else {
                alert("주소를 찾을 수 없습니다. (에러 코드: " + status + ")");
            }
        });
    }
    </script>
</body>
</html>
