<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대차분쟁 조정위원회 간편 찾기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; padding: 25px; line-height: 1.6; color: #333; background-color: #f0f2f5; margin: 0; }
        .main-wrapper { display: flex; max-width: 1400px; margin: 0 auto; gap: 25px; align-items: flex-start; }
        .content-area { flex: 0 0 auto; width: 490px; }

        /* 검색 섹션 */
        .search-section { background: #ffffff; padding: 28px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); position: relative; border: 1px solid #eee; }
        h1 { font-size: 1.45rem; color: #003366; margin: 0 0 10px 0; font-weight: 700; }
        .subtitle { color: #718096; font-size: 0.95rem; margin-bottom: 20px; }
        
        .input-group { display: flex; gap: 10px; position: relative; }
        input { flex: 1; padding: 13px 16px; border: 1.5px solid #edf2f7; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        button { padding: 0 24px; background: #007aff; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* 추천 박스 */
        .suggestion-box { 
            position: absolute; top: 55px; left: 0; right: 105px; 
            background: white; border: 1px solid #007aff; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 999; 
            display: none; overflow: hidden; 
        }
        .suggestion-item { padding: 15px 18px; font-size: 1rem; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; }
        .suggestion-item:hover { background-color: #f0f7ff; color: #007aff; font-weight: 600; }

        /* 결과 카드 */
        .info-box { width: 100%; box-sizing: border-box; padding: 26px; border-radius: 18px; background: #ffffff; border: 1px solid #edf2f7; margin-bottom: 15px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border-left: 6px solid #007aff; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .rank-tag { font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 15px; margin-bottom: 12px; display: inline-block; background: #eaf4ff; color: #007aff; }
        .info-box h3 { margin: 5px 0 12px; font-size: 1.25rem; font-weight: 700; color: #1a202c; }
        .region-tag { font-size: 1.15rem; font-weight: 800; margin-left: 10px; color: #ff4d4f; }
        .details { font-size: 1.1rem; line-height: 1.8; color: #333; }
        .details b { width: 55px; display: inline-block; font-size: 0.95rem; color: #718096; }
        .tel-link { text-decoration: none; font-weight: 800; color: #e53e3e !important; }

        /* 법령 섹션 */
        .side-law-section { width: 420px; position: sticky; top: 25px; flex-shrink: 0; }
        .law-container { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eef2f6; height: calc(100vh - 50px); display: flex; flex-direction: column; }
        .law-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
        .law-tab { flex: 1; padding: 18px; text-align: center; cursor: pointer; font-weight: 700; font-size: 0.95rem; color: #94a3b8; }
        .law-tab.active { background: #fff; color: #007aff; border-bottom: 3px solid #007aff; }
        .law-list { padding: 10px 20px; overflow-y: auto; flex: 1; display: none; }
        .law-list.active { display: block; }
        .law-item { border-bottom: 1px solid #f1f5f9; }
        .law-q { padding: 16px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: 600; color: #475569; }
        .law-a { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: #f8fafc; border-radius: 12px; font-size: 0.88rem; color: #4a5568; }
        .law-a-inner { padding: 15px; line-height: 1.7; border-left: 4px solid #007aff; }
        .law-item.open .law-a { max-height: 500px; margin-bottom: 15px; }
        .law-item.open .law-q { color: #007aff; font-weight: 800; }
        .btn-full-law { display: block; text-align: center; padding: 15px; background: #f1f5f9; color: #64748b; text-decoration: none; border-radius: 12px; font-size: 0.85rem; font-weight: 700; margin: 20px 0; border: 1px dashed #cbd5e1; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="content-area">
            <div class="search-section">
                <h1>🔍 임대차분쟁 조정위원회 간편 찾기</h1>
                <p class="subtitle">지역명을 입력하시면 관할 기관을 즉시 찾아드립니다.</p>
                <div class="input-group">
                    <input type="text" id="addressInput" placeholder="예: 동구, 가평, 서초" autocomplete="off" oninput="showSuggest(this.value)" onkeypress="if(event.keyCode==13) startSearch()">
                    <button onclick="startSearch()">검색</button>
                    <div id="suggestBox" class="suggestion-box">
                        <div class="suggestion-item" onclick="applyRegion('대구광역시 동구')">📍 대구광역시 동구 (대구관할)</div>
                        <div class="suggestion-item" onclick="applyRegion('부산광역시 동구')">📍 부산광역시 동구 (부산관할)</div>
                        <div class="suggestion-item" onclick="applyRegion('경기도 가평군')">📍 경기도 가평군 (경기관할)</div>
                        <div class="suggestion-item" onclick="applyRegion('서울특별시 서초구')">📍 서울특별시 서초구 (서울관할)</div>
                    </div>
                </div>
            </div>
            <div id="resultArea"></div>
        </div>

        <div class="side-law-section">
            <div class="law-container">
                <div class="law-tabs">
                    <div class="law-tab active" onclick="switchLaw('house', event)">주택임대차</div>
                    <div class="law-tab" onclick="switchLaw('store', event)">상가임대차</div>
                </div>
                <div id="house-law" class="law-list active">
                    <div class="law-item"><div class="law-q" onclick="toggleLaw(this)">제3조 (대항력) <i class="fas fa-chevron-down"></i></div><div class="law-a"><div class="law-a-inner">인도와 전입신고 시 다음 날부터 대항력이 발생합니다.</div></div></div>
                    <div class="law-item"><div class="law-q" onclick="toggleLaw(this)">제6조의3 (계약갱신) <i class="fas fa-chevron-down"></i></div><div class="law-a"><div class="law-a-inner">임차인은 1회에 한해 2년 연장을 요구할 수 있습니다. (5% 제한)</div></div></div>
                    <a href="https://www.law.go.kr" target="_blank" class="btn-full-law">주택임대차보호법 전문 보기</a>
                </div>
                <div id="store-law" class="law-list">
                    <div class="law-item"><div class="law-q" onclick="toggleLaw(this)">제10조 (계약갱신) <i class="fas fa-chevron-down"></i></div><div class="law-a"><div class="law-a-inner">전체 임대차 기간 10년 범위 내에서 요구 가능합니다.</div></div></div>
                    <a href="https://www.law.go.kr" target="_blank" class="btn-full-law">상가임대차보호법 전문 보기</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4da8cb17ef81b1cbfb11f06b1e77e43f&libraries=services"></script>
    <script>
        const agencyData = [
            { name: "한국부동산원 성남지사", region: "경기관할", keys: ["경기", "성남", "가평", "수원", "용인", "파주"], address: "경기도 성남시 분당구 야탑로 81", tel: "031-8017-8488" },
            { name: "대한법률구조공단 대구지부", region: "대구관할", keys: ["대구", "수성", "달서"], address: "대구광역시 동구 동대구로 489", tel: "053-744-6401" },
            { name: "서울시청 조정위원회", region: "서울관할", keys: ["서울", "서초", "강남", "종로"], address: "서울시 중구 덕수궁길 15", tel: "02-2133-1200" },
            { name: "대한법률구조공단 부산지부", region: "부산관할", keys: ["부산", "해운대", "연제"], address: "부산광역시 연제구 법원로 20", tel: "051-505-1644" }
        ];

        function showSuggest(v) {
            document.getElementById('suggestBox').style.display = v.trim().length > 0 ? 'block' : 'none';
        }

        function applyRegion(name) {
            document.getElementById('addressInput').value = name;
            document.getElementById('suggestBox').style.display = 'none';
            startSearch();
        }

        // 외부 클릭 시 추천창 닫기
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.input-group')) document.getElementById('suggestBox').style.display = 'none';
        });

        function startSearch() {
            const input = document.getElementById('addressInput').value;
            if(!input) return;

            const geocoder = new kakao.maps.services.Geocoder();
            geocoder.addressSearch(input, function(result, status) {
                const resArea = document.getElementById('resultArea');
                resArea.innerHTML = '';
                document.getElementById('suggestBox').style.display = 'none';

                if (status === kakao.maps.services.Status.OK) {
                    const fullAddr = result[0].address_name; // 예: "대구 동구 신암동..."
                    
                    // 관할 찾기 로직: 주소 문자열에 기관 키워드가 포함되는지 확인
                    const match = agencyData.find(a => 
                        a.keys.some(k => fullAddr.includes(k)) || fullAddr.includes(a.region.replace("관할",""))
                    );

                    if (match) {
                        resArea.innerHTML = `
                            <div class="info-box">
                                <span class="rank-tag">해당 지역의 관할 기관입니다</span>
                                <h3>${match.name}<span class="region-tag">(${match.region})</span></h3>
                                <div class="details">
                                    <div><b>주소</b> <span>${match.address}</span></div>
                                    <div style="margin-top:10px;"><b>문의</b> <a href="tel:${match.tel}" class="tel-link">${match.tel}</a></div>
                                </div>
                            </div>`;
                    } else {
                        resArea.innerHTML = '<div class="info-box" style="border-left-color:#ccc;"><p>해당 지역의 관할 정보를 찾을 수 없습니다. 광역지자체명(예: 대구, 경기)을 포함해 보세요.</p></div>';
                    }
                } else {
                    resArea.innerHTML = '<div class="info-box" style="border-left-color:#ccc;"><p>정확한 지역명을 입력해 주세요.</p></div>';
                }
            });
        }

        function switchLaw(t, e) {
            document.querySelectorAll('.law-tab, .law-list').forEach(el => el.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(t + '-law').classList.add('active');
        }

        function toggleLaw(el) {
            const item = el.parentElement;
            const open = item.classList.contains('open');
            document.querySelectorAll('.law-item').forEach(i => i.classList.remove('open'));
            if(!open) item.classList.add('open');
        }
    </script>
</body>
</html>
