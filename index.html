<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대차분쟁 조정위원회 & 법령 가이드 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        /* 기본 레이아웃 설정 */
        body { 
            font-family: 'Pretendard', sans-serif; 
            padding: 20px; 
            line-height: 1.6; 
            color: #333; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        
        .main-wrapper { 
            display: flex; 
            max-width: 1500px; 
            margin: 0 auto; 
            gap: 24px; 
            align-items: flex-start; 
        }

        /* [좌측] 한국부동산원 배너 */
        .side-banner-left {
            width: 170px; 
            background: linear-gradient(135deg, #004ea2, #007aff);
            padding: 30px 15px; 
            border-radius: 24px; 
            color: white; 
            text-decoration: none;
            position: sticky; 
            top: 20px; 
            flex-shrink: 0; 
            text-align: center; 
            box-shadow: 0 12px 30px rgba(0,78,162,0.2);
            transition: transform 0.3s ease;
        }
        .side-banner-left:hover { transform: translateY(-5px); }
        .side-banner-left i { font-size: 2.2rem; margin-bottom: 15px; display: block; }
        .side-banner-left strong { display: block; font-size: 1.1rem; line-height: 1.4; margin-bottom: 8px; }
        .side-banner-left span { font-size: 0.8rem; opacity: 0.8; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; }

        /* [중앙] 메인 검색 및 결과 영역 */
        .content-area { 
            flex: 1; 
            min-width: 0; 
            max-width: 750px; 
        }
        .search-section { 
            background: #ffffff; 
            padding: 35px; 
            border-radius: 24px; 
            margin-bottom: 25px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        }
        h1 { font-size: 1.7rem; color: #003366; margin-bottom: 10px; font-weight: 800; }
        .subtitle { color: #777; font-size: 0.95rem; margin-bottom: 25px; }
        
        .input-group { display: flex; gap: 10px; }
        input { 
            flex: 1; 
            padding: 18px 25px; 
            border: 2px solid #edf2f7; 
            border-radius: 16px; 
            font-size: 1rem; 
            outline: none; 
            transition: border-color 0.3s;
        }
        input:focus { border-color: #007aff; }
        button { 
            padding: 0 30px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }

        #map { width: 100%; height: 400px; margin-top: 25px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        /* 결과 카드 스타일 */
        .result-container { margin-top: 10px; }
        .info-box { 
            padding: 24px; 
            border-radius: 20px; 
            background: #ffffff; 
            border: 1px solid #edf2f7; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
            position: relative; 
            margin-bottom: 15px; 
            transition: border-color 0.3s;
        }
        .info-box.best { border-left: 8px solid #007aff; }
        .info-box.second { border-left: 8px solid #ffcc00; }
        .rank-tag { 
            font-size: 0.75rem; 
            font-weight: 800; 
            padding: 5px 12px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            display: inline-block; 
        }
        .best .rank-tag { background: #eaf4ff; color: #007aff; }
        .second .rank-tag { background: #fff9e6; color: #cc9900; }
        .info-box h3 { margin: 5px 0 12px; font-size: 1.3rem; color: #1a202c; }
        .details b { color: #a0aec0; width: 50px; display: inline-block; font-size: 0.9rem; }
        .tel-link { text-decoration: none; font-weight: 700; color: #e53e3e !important; }

        /* [우측] 법령 아코디언 섹션 */
        .side-law-section { 
            width: 420px; 
            position: sticky; 
            top: 20px; 
            flex-shrink: 0; 
        }
        .law-container { 
            background: #fff; 
            border-radius: 24px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            border: 1px solid #eef2f6; 
            height: calc(100vh - 60px); 
            display: flex; 
            flex-direction: column; 
        }
        .law-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
        .law-tab { 
            flex: 1; 
            padding: 18px; 
            text-align: center; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.95rem; 
            color: #94a3b8; 
            transition: 0.3s;
        }
        .law-tab.active { background: #fff; color: #007aff; border-bottom: 3px solid #007aff; }

        .law-list { padding: 10px 20px; overflow-y: auto; display: none; flex: 1; }
        .law-list.active { display: block; }

        .law-item { border-bottom: 1px solid #f1f5f9; }
        .law-q { 
            padding: 16px 0; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            font-size: 0.92rem; 
            font-weight: 600; 
            color: #475569; 
        }
        .law-q:hover { color: #007aff; }
        .law-a { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            background: #f8fafc; 
            border-radius: 12px; 
            font-size: 0.88rem; 
            color: #4a5568; 
        }
        .law-a-inner { padding: 15px; line-height: 1.7; border-left: 4px solid #007aff; }
        .law-item.open .law-a { max-height: 500px; margin-bottom: 15px; }
        .law-item.open .law-q { color: #007aff; font-weight: 800; }

        .btn-full-law {
            display: block; 
            text-align: center; 
            padding: 15px; 
            background: #f1f5f9; 
            color: #64748b; 
            text-decoration: none; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            margin: 20px 0;
            border: 1px dashed #cbd5e1;
            transition: 0.2s;
        }
        .btn-full-law:hover { background: #e2e8f0; color: #334155; }

        /* 반응형 */
        @media (max-width: 1200px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .side-banner-left, .side-law-section { width: 100%; max-width: 750px; position: static; }
            .law-container { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="https://www.reb.or.kr" target="_blank" class="side-banner-left">
            <i class="fas fa-building"></i>
            <strong>한국부동산원</strong>
            <span>홈페이지 이동</span>
        </a>

        <div class="content-area">
            <div class="search-section">
                <h1>🔍 분쟁조정위원회 통합 검색</h1>
                <p class="subtitle">지번/도로명 주소를 입력하시면 인근 조정위원회를 찾아드립니다.</p>
                <div class="input-group">
                    <input type="text" id="address" placeholder="예: 경기도 성남시 분당구 야탑로" onkeypress="if(event.keyCode==13) findNearest()">
                    <button onclick="findNearest()">검색하기</button>
                </div>
            </div>
            
            <div id="result-list" class="result-container"></div>
            <div id="map"></div>
        </div>

        <div class="side-law-section">
            <div class="law-container">
                <div class="law-tabs">
                    <div class="law-tab active" onclick="showLaw('house', event)">주택임대차</div>
                    <div class="law-tab" onclick="showLaw('store', event)">상가임대차</div>
                </div>

                <div id="house-law" class="law-list active">
                    <div class="law-item">
                        <div class="law-q" onclick="toggleItem(this)">제1조 (목적) <i class="fas fa-chevron-down"></i></div>
                        <div class="law-a"><div class="law-a-inner">주거용 건물의 임대차에 관해 민법에 대한 특례를 규정하여 <b>국민 주거생활의 안정</b>을 보장하는 것을 목적으로 합니다.</div></div>
                    </div>
                    <div class="law-item">
                        <div class="law-q" onclick="toggleItem(this)">제2조 (적용 범위
