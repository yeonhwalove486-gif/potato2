<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>건물까지 보기</title>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=addcdb33e34119e1321e3b15f577f41a&libraries=services"></script>
</head>
<body>

<input type="text" id="address" placeholder="주소 입력">
<button onclick="searchAddress()">검색</button>

<div id="map" style="width:100%;height:400px;"></div>

<script>
var map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(37.5665, 126.9780),
  level: 3
});

var geocoder = new kakao.maps.services.Geocoder();
var marker = new kakao.maps.Marker({ map: map });

function searchAddress() {
  var address = document.getElementById('address').value;

  geocoder.addressSearch(address, function(result, status) {

    if (status === kakao.maps.services.Status.OK) {

      var coords = new kakao.maps.LatLng(result[0].y, result[0].x);

      map.setCenter(coords);

      // 🔥 여기 핵심
      map.setLevel(1); // 건물 보이게 확대

      marker.setPosition(coords);

    } else {
      alert("주소를 찾을 수 없습니다.");
    }

  });
