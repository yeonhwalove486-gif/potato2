<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>지도</title>

  <!-- ✅ SDK 먼저 로드 -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=addcdb33e34119e1321e3b15f577f41a&libraries=services"></script>
</head>

<body>

<input type="text" id="address" placeholder="서울시청">
<button onclick="searchAddress()">검색</button>

<div id="map" style="width:100%; height:400px;"></div>

<!-- ✅ JS 코드는 맨 아래 -->
<script>
var map = new kakao.maps.Map(document.getElementById('map'), {
  center: new kakao.maps.LatLng(37.5665, 126.9780),
  level: 3
});

var ps = new kakao.maps.services.Places();
var marker = new kakao.maps.Marker({ map: map });

function searchAddress() {
  var keyword = document.getElementById('address').value;

  ps.keywordSearch(keyword, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      var coords = new kakao.maps.LatLng(data[0].y, data[0].x);

      map.setCenter(coords);
      map.setLevel(1);
      map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
      marker.setPosition(coords);
    }
  });
}
</script>

</body>
</html>
