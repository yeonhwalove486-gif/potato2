<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가까운 조정위원회 찾기</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #map { width: 100%; height: 400px; margin-top: 20px; background-color: #eee; border: 1px solid #ccc; }
        #result { margin-top: 15px; }
        .info-box { padding: 15px; border: 2px solid #007bff; border-radius: 10px; background: #f8f9fa; }
        input { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>우리집에서 가까운 조정위원회 찾기</h1>
    <p>주소를 입력하면 가장 가까운 위원회를 계산해 드립니다.</p>
    
    <input type="text" id="address" placeholder="예: 대구 동구 신서동" onkeypress="if(event.keyCode==13) findNearest()">
    <button onclick="findNearest()">찾기</button>
    
    <div id="result">결과가 여기에 표시됩니다.</div>
    <div id="map"></div>

   <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4da8cb17ef81b1cbfb11f06b1e77e43f&libraries=services"></script>

    <script>
    // 1. 위원회 데이터 (대구 지역 정밀 좌표)
    const locations =[
        // --- 대한법률구조공단 (대법공) ---
        { name: "대한법률구조공단 서울지부", lat: 37.494388, lng: 127.013068, address: "서울시 서초구 법원로 2길 21, 1층", tel: "02-6941-3430" },
        { name: "대한법률구조공단 수원지부", lat: 37.277502, lng: 127.049498, address: "경기도 수원시 영통구 월드컵로150번길 10, 3층", tel: "031-8007-3430" },
        { name: "대한법률구조공단 대전지부", lat: 36.356303, lng: 127.387912, address: "대전광역시 서구 둔산북로 121, 1층", tel: "042-721-3430" },
        { name: "대한법률구조공단 대구지부", lat: 35.859380, lng: 128.631916, address: "대구광역시 수성구 달구벌대로 2461, 3층", tel: "053-710-3430" },
        { name: "대한법률구조공단 부산지부", lat: 35.190796, lng: 129.074017, address: "부산광역시 연제구 법원남로 15번길 4, 5층", tel: "051-711-3430" },
        { name: "대한법률구조공단 광주지부", lat: 35.149161, lng: 126.848903, address: "광주광역시 서구 상무중앙로28번길 4, 4층", tel: "062-710-3430" },

        // --- 한국부동산원 / LH ---
        { name: "한국부동산원 서울동부 분쟁조정위", lat: 37.557785, lng: 127.078888, address: "서울특별시 광진구 천호대로 549 G타워 10층", tel: "02-3394-9870" },
        { name: "한국부동산원 경기고양 분쟁조정위", lat: 37.652641, lng: 126.776898, address: "경기도 고양시 일산동구 중앙로 1187, 8층", tel: "031-902-3573" },
        { name: "한국부동산원 경기성남 분쟁조정위", lat: 37.411177, lng: 127.128236, address: "경기도 성남시 분당구 야탑로 81번길 16, 5층", tel: "031-8017-8488" },
        { name: "한국부동산원 인천 분쟁조정위", lat: 37.400920, lng: 126.711817, address: "인천광역시 남동구 논현로 46번길 23, 7층", tel: "032-429-7041" },
        { name: "한국부동산원 강원 분쟁조정위", lat: 37.883457, lng: 127.728608, address: "강원도 춘천시 중앙로 16, 7층(무림빌딩)", tel: "033-244-9793" },
        { name: "한국부동산원 세종 분쟁조정위", lat: 36.508129, lng: 127.261088, address: "세종특별자치시 한누리대로 499, 302호", tel: "044-868-8341" },
        { name: "한국부동산원 전북 분쟁조정위", lat: 35.837684, lng: 127.131376, address: "전북 전주시 덕진구 기린대로 405, 3층", tel: "063-276-8022" },
        { name: "한국부동산원 경북포항 분쟁조정위", lat: 36.030936, lng: 129.366027, address: "경북 포항시 북구 중앙로 201, 8층", tel: "054-275-9771" },
        { name: "한국부동산원 울산 분쟁조정위", lat: 35.551720, lng: 129.265367, address: "울산광역시 남구 북부순환도로 17, 남운프라자 906호", tel: "052-224-8872" },
        { name: "한국부동산원 경남창원 분쟁조정위", lat: 35.217972, lng: 128.676166, address: "경상남도 창원시 성산구 중앙대로 32, 2층", tel: "055-289-3890" },
        { name: "LH 충북 분쟁조정위", lat: 36.614228, lng: 127.450818, address: "충청북도 청주시 서원구 구룡산로52번길 2, 303호", tel: "043-905-1784" },
        { name: "LH 제주 분쟁조정위", lat: 33.505043, lng: 126.525511, address: "제주시 중앙로 150 대한항공제주사옥 3층", tel: "064-901-3802" }
    ];

    // 2. 거리 계산 함수
    function getDistance(lat1, lng1, lat2, lng2) {
        const r = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLng / 2) * Math.sin(dLng / 2);
        return r * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // 3. 찾기 실행 함수
    function findNearest() {
        const address = document.getElementById('address').value;
        if (!address) {
            alert("주소를 입력해주세요!");
            return;
        }

        // [진단] 카카오 라이브러리 로드 체크
        if (typeof kakao === 'undefined' || !kakao.maps || !kakao.maps.services) {
            alert("❌ 카카오 지도를 불러오지 못했습니다!\n\n원인 확인:\n1. 카카오 개발자 센터에 '도메인' 등록이 안 됨\n2. 등록한 도메인이 현재 접속 주소와 다름\n3. 사용 중인 키가 'JavaScript 키'가 아님");
            return;
        }

        const geocoder = new kakao.maps.services.Geocoder();

        geocoder.addressSearch(address, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const userLat = parseFloat(result[0].y);
                const userLng = parseFloat(result[0].x);
                const userPos = new kakao.maps.LatLng(userLat, userLng);

                let nearest = null;
                let minDistance = Infinity;

                locations.forEach(loc => {
                    const dist = getDistance(userLat, userLng, loc.lat, loc.lng);
                    if (dist < minDistance) {
                        minDistance = dist;
                        nearest = loc;
                    }
                });

                // 결과 출력
                document.getElementById('result').innerHTML = `
                    <div class="info-box">
                        <h3 style="margin-top:0; color:#007bff;">✅ 가장 가까운 곳: ${nearest.name}</h3>
                        <p>직선 거리: 약 <b>${minDistance.toFixed(2)}km</b></p>
                        <p>주소: ${nearest.address}</p>
                        <a href="https://map.kakao.com/link/to/${nearest.name},${nearest.lat},${nearest.lng}" target="_blank" style="color:blue; font-weight:bold;">[카카오맵 길찾기]</a>
                    </div>
                `;
                
                // 지도 업데이트
                const mapContainer = document.getElementById('map');
                const mapOption = { center: userPos, level: 6 };
                const map = new kakao.maps.Map(mapContainer, mapOption);
                
                // 마커 표시
                new kakao.maps.Marker({ position: userPos, map: map }); // 내 위치
                
                const targetPos = new kakao.maps.LatLng(nearest.lat, nearest.lng);
                const imageSrc = "https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png"; 
                const markerImage = new kakao.maps.MarkerImage(imageSrc, new kakao.maps.Size(24, 35));
                new kakao.maps.Marker({ position: targetPos, map: map, image: markerImage }); // 위원회 위치

            } else {
                alert("주소를 찾을 수 없습니다. (에러 코드: " + status + ")");
            }
        });
    }
    </script>
</body>
</html>
