<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대차 조정위원회 찾기</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; color: #333; max-width: 700px; margin: 0 auto; background-color: #f0f2f5; }
        
        /* 검색창 섹션 */
        .search-section { 
            background: linear-gradient(135deg, #ffffff 0%, #f9faff 100%); 
            padding: 40px 30px; border-radius: 30px; margin-bottom: 30px; 
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }
        h1 { font-size: 1.7rem; color: #1a1a1a; margin-bottom: 10px; font-weight: 800; }
        .subtitle { color: #666; font-size: 1rem; margin-bottom: 25px; }

        /* 입력창 디자인 */
        .input-group { position: relative; display: flex; gap: 10px; background: white; padding: 8px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border: 1px solid #eee; }
        input { flex: 1; padding: 15px 20px; border: none; border-radius: 15px; font-size: 1.1rem; outline: none; }
        button { 
            padding: 0 30px; background: #007aff; color: white; border: none; 
            border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,122,255,0.3);
        }
        button:hover { background: #0056b3; transform: scale(1.02); }

        /* 결과 카드 컨테이너 */
        .result-container { display: flex; flex-direction: column; gap: 20px; margin-top: 25px; }
        
        /* 공통 카드 스타일 */
        .info-box { 
            padding: 30px; border-radius: 24px; background: #ffffff; 
            position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideIn 0.5s ease-out forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 1순위 베스트 카드 디자인 (강조) */
        .info-box.best { 
            background: linear-gradient(to right, #ffffff, #f2fff5);
            border: 2px solid #34c759;
            box-shadow: 0 15px 35px rgba(52, 199, 89, 0.15);
        }
        .info-box.best::before {
            content: "BEST"; position: absolute; top: -10px; right: -10px;
            background: #34c759; color: white; padding: 20px 40px 10px;
            transform: rotate(45deg); font-weight: 900; font-size: 0.7rem; letter-spacing: 1px;
        }

        /* 2순위 카드 디자인 */
        .info-box.second { 
            border: 1px solid #e1e4e8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* 태그 및 거리 표시 */
        .rank-tag { 
            font-size: 0.8rem; font-weight: 800; padding: 6px 16px; border-radius: 50px; 
            margin-bottom: 15px; display: inline-block;
        }
        .best .rank-tag { background: #34c759; color: white; box-shadow: 0 4px 10px rgba(52,199,89,0.3); }
        .second .rank-tag { background: #f0f2f5; color: #666; }

        .distance-val { 
            position: absolute; top: 30px; right: 30px; font-weight: 800; 
            font-size: 1.4rem; color: #007aff; letter-spacing: -1px;
        }
        .distance-val span { font-size: 0.9rem; margin-left: 2px; color: #999; }

        /* 텍스트 디테일 */
        .info-box h3 { margin: 10px 0; font-size: 1.4rem; color: #1a1a1a; letter-spacing: -0.5px; }
        .details { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
        .details div { margin-bottom: 8px; display: flex; align-items: center; font-size: 0.95rem; }
        .details b { width: 55px; color: #999; font-weight: 600; font-size: 0.85rem; }
        .details a { color: #007aff; text-decoration: none; font-weight: 700; border-bottom: 2px solid rgba(0,122,255,0.1); }

        #map { width: 100%; height: 350px; margin-top: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid white; }
    </style>
</head>
<body>

    <div class="search-section">
        <h1>📍 내 관할 조정위원회</h1>
        <p class="subtitle">가장 빠르고 정확한 방문을 위해 가까운 곳을 추천합니다.</p>
        <div class="input-group">
            <input type="text" id="address" placeholder="어디에 살고 계신가요? (예: 가평군, 서초동)" onkeypress="if(event.keyCode==13) findNearest()">
            <button onclick="findNearest()">검색</button>
        </div>
    </div>
