<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대차분쟁 조정위원회 & 법령 가이드 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; color: #333; background-color: #f0f2f5; margin: 0; }
        .main-wrapper { display: flex; max-width: 1500px; margin: 0 auto; gap: 24px; align-items: flex-start; }

        /* [좌측] 배너 */
        .side-banner-left {
            width: 170px; background: linear-gradient(135deg, #004ea2, #007aff);
            padding: 30px 15px; border-radius: 24px; color: white; text-decoration: none;
            position: sticky; top: 20px; flex-shrink: 0; text-align: center; box-shadow: 0 12px 30px rgba(0,78,162,0.2);
        }

        /* [중앙] 검색 영역 */
        .content-area { flex: 1; min-width: 0; max-width: 750px; }
        .search-section { 
            background: #ffffff; padding: 35px; border-radius: 24px; margin-bottom: 25px; 
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
        }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 18px 25px; border: 2px solid #edf2f7; border-radius: 16px; font-size: 1rem; outline: none; }
        button { padding: 0 30px; background: #007aff; color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }

        /* 결과 카드 */
        .result-container { display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .info-box { 
            flex: 1 1 calc(50% - 15px); min-width: 280px; padding: 24px; border-radius: 20px; 
            background: #ffffff; border: 1px solid #edf2f7; border-left: 8px solid #007aff;
            position: relative; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .rank-tag { font-size: 0.75rem; font-weight: 800; padding: 5px 12px; border-radius: 20px; margin-bottom: 12px; display: inline-block; background: #eaf4ff; color: #007aff; }
        .dist-tag { float: right; font-size: 0.85rem; color: #007aff; font-weight: 700; }
        .info-box h3 { margin: 5px 0 12px; font-size: 1.1rem; color: #1a202c; }
        .tel-link { text-decoration: none; font-weight: 700; color: #e53e3e !important; }

        /* [우측] 법령 섹션 */
        .side-law-section { width: 400px; position: sticky; top: 20px; flex-shrink: 0; }
        .law-container { background: #fff; border-radius: 24px; height: calc(100vh - 60px); display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .law-tabs { display: flex; background: #f8fafc; }
        .law-tab { flex: 1; padding: 18px; text-align: center; cursor: pointer; font-weight: 700; color: #94a3b8; }
        .law-tab.active { background: #fff; color: #007aff; border-bottom: 3px solid #007aff; }
        .law-list { padding: 20px; overflow-y: auto; display: none; flex: 1; }
        .law-list.active { display: block; }
        
        @media (max-width: 1200px) { .main-wrapper { flex-direction: column; } .side-banner-left, .side-law-section { width: 100%; position: static; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <a href="https://www.reb.or.kr" target="_blank" class="side-banner-left">
            <i class="fas fa-building"></i><strong>한국부동산원</strong><span>홈페이지 이동</span>
        </a>

        <div class="content-area">
            <div class="search-section">
                <h1>🔍 내 주변 관할 조정위 찾기</h1>
                <p>주소를 입력하시면 <b>가장 가까운 관할 지부</b>순으로 추천해 드립니다.</p>
                <div class="input-group">
                    <input type="text" id="address" placeholder="예: 고양시, 수원시, 인천 남동구" onkeypress="if(event.keyCode==13) searchJurisdiction()">
                    <button onclick="searchJurisdiction()">검색하기</button>
                </div>
            </div>
            <div id="result-list" class="result-container"></div>
        </div>

        <div class="side-law-section">
            <div class="law-container">
                <div class="law-tabs">
                    <div class="law-tab active" onclick="showLaw('house', event)">주택임대차</div>
                    <div class="law-tab" onclick="showLaw('store', event)">상가임대차</div>
                </div>
                <div id="house-law" class="law-list active">
                    <p>중요 법령 가이드가 표시됩니다.</p>
                </div>
                <div id="store-law" class="law-list">
                    <p>상가 관련 법령 가이드가 표시됩니다.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4da8cb17ef81b1cbfb11f06b1e77e43f&libraries=services"></script>
    <script>
        // 지부 데이터 (거리 계산을 위해 좌표 lat, lng 추가)
        const locations = [
            { name: "서울시청 조정위", address: "서울시 중구 덕수궁길 15", tel: "02-2133-1200", lat: 37.5665, lng: 126.9780 },
            { name: "법률구조공단 서울지부", address: "서울시 서초구 법원로 2길 21", tel: "02-6941-3430", lat: 37.4925, lng: 127.0122 },
            { name: "한국부동산원 동부지사", address: "서울시 광진구 천호대로 549", tel: "02-3394-9870", lat: 37.5577, lng: 127.0788 },
            { name: "한국부동산원 고양지사", address: "경기도 고양시 일산동구 중앙로 1187", tel: "031-902-3573", lat: 37.6441, lng: 126.8325 },
            { name: "한국부동산원 성남지사", address: "경기도 성남시 분당구 야탑로 81", tel: "031-8017-8488", lat: 37.4111, lng: 127.1288 },
            { name: "법률구조공단 수원지부", address: "경기도 수원시 영통구 월드컵로 150", tel: "031-8007-3430", lat: 37.2844, lng: 127.0444 },
            { name: "한국부동산원 인천지사", address: "인천시 남동구 논현로 46", tel: "032-429-7041", lat: 37.4042, lng: 126.7225 }
        ];

        const jurisdictionMap = {
            "서울": ["서울시청 조정위", "법률구조공단 서울지부", "한국부동산원 동부지사"],
            "경기": ["법률구조공단 수원지부", "한국부동산원 고양지사", "한국부동산원 성남지사"],
            "인천": ["한국부동산원 인천지사"]
        };

        // 두 좌표 간의 거리 계산 함수 (단위: km)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLng = (lng2 - lng1) * (Math.PI / 180);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function searchJurisdiction() {
            const input = document.getElementById('address').value;
            if (!input) return;
            
            const geocoder = new kakao.maps.services.Geocoder();
            geocoder.addressSearch(input, function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    const userLat = parseFloat(result[0].y);
                    const userLng = parseFloat(result[0].x);
                    const sidoRaw = result[0].address.region_1depth_name;
                    
                    let sidoKey = "";
                    if (sidoRaw.includes("서울")) sidoKey = "서울";
                    else if (sidoRaw.includes("경기")) sidoKey = "경기";
                    else if (sidoRaw.includes("인천")) sidoKey = "인천";

                    const targetNames = jurisdictionMap[sidoKey] || [];
                    
                    // 1. 관할 기관 필터링 & 2. 거리 계산 추가
                    let matched = locations
                        .filter(loc => targetNames.includes(loc.name))
                        .map(loc => ({
                            ...loc,
                            distance: getDistance(userLat, userLng, loc.lat, loc.lng)
                        }));

                    // 3. 거리순 정렬 (가까운 순)
                    matched.sort((a, b) => a.distance - b.distance);

                    const resList = document.getElementById('result-list');
                    resList.innerHTML = '';
                    
                    matched.forEach((loc, index) => {
                        const card = document.createElement('div');
                        card.className = "info-box";
                        card.innerHTML = `
                            <span class="rank-tag">${index === 0 ? '🚀 최단거리 추천' : sidoKey + ' 관할'}</span>
                            <span class="dist-tag">${loc.distance.toFixed(1)}km</span>
                            <h3>${loc.name}</h3>
                            <div class="details">
                                <div><b>주소</b> <span>${loc.address}</span></div>
                                <div style="margin-top:6px;"><b>문의</b> <a href="tel:${loc.tel}" class="tel-link">${loc.tel}</a></div>
                            </div>
                        `;
                        resList.appendChild(card);
                    });
                } else {
                    alert("주소를 찾을 수 없습니다.");
                }
            });
        }

        function showLaw(type, event) {
            document.querySelectorAll('.law-tab, .law-list').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(type + '-law').classList.add('active');
        }
    </script>
</body>
</html>
