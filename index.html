<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임대차분쟁 조정위원회 간편 찾기 & 법령 가이드 시스템</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            padding: 25px; 
            line-height: 1.6; 
            color: #333; 
            background-color: #f0f2f5; 
            margin: 0; 
        }
        
        .main-wrapper { 
            display: flex; 
            max-width: 1400px; 
            margin: 0; 
            gap: 25px; 
            align-items: flex-start; 
        }

        .content-area { 
            flex: 0 0 auto;
            width: 490px; 
        }

        /* [좌측] 타이틀 및 검색 박스 */
        .search-section { 
            background: #ffffff; 
            padding: 28px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            text-align: left; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
            width: 100%; 
            box-sizing: border-box;
            border: 1px solid #eee;
            position: relative;
        }

        h1 { 
            font-size: 1.45rem; 
            color: #003366; 
            margin: 0 0 10px 0; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        .subtitle { 
            color: #718096; 
            font-size: 0.95rem; 
            margin-bottom: 20px; 
            white-space: nowrap;
        }
        
        .input-group { 
            display: flex; 
            gap: 10px; 
        }
        input { 
            flex: 1; 
            padding: 13px 16px; 
            border: 1.5px solid #edf2f7; 
            border-radius: 12px; 
            font-size: 1rem; 
            outline: none; 
        }
        input:focus { border-color: #007aff; }
        
        button { 
            padding: 0 24px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1rem; 
            cursor: pointer; 
        }

        .suggestion-box {
            position: absolute;
            top: 155px; 
            left: 28px;
            right: 125px; 
            background: white;
            border: 1px solid #edf2f7;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 100;
            display: none; 
            overflow: hidden;
        }
        .suggestion-item {
            padding: 12px 16px;
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 1px solid #f8fafc;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: #f0f7ff; color: #007aff; }

        /* [좌측] 결과 박스 공통 스타일 */
        .info-box { 
            width: 100%; 
            box-sizing: border-box;
            padding: 26px; 
            border-radius: 18px; 
            background: #ffffff; 
            border: 1px solid #edf2f7; 
            margin-bottom: 15px; 
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        .rank-tag { font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 15px; margin-bottom: 12px; display: inline-block; }
        .info-box h3 { margin: 5px 0 12px; font-size: 1.25rem; font-weight: 700; }
        
        /* 관할 안내 문구 디자인 (크기 키움) */
        .region-tag {
            font-size: 0.95rem; /* 기존보다 크기 확대 */
            font-weight: 400;
            margin-left: 6px;
        }

        .details { font-size: 1.1rem; line-height: 1.8; }
        .details b { width: 50px; display: inline-block; font-size: 0.95rem; }
        .tel-link { text-decoration: none; font-weight: 800; }
        .dist-text { position: absolute; top: 24px; right: 24px; font-weight: 800; font-size: 1.05rem; }

        /* TOP 1 - 인근 추천 스타일 (기존 색상 유지) */
        .info-box.best { border-left: 6px solid #007aff; }
        .best .rank-tag { background: #eaf4ff; color: #007aff; }
        .best h3 { color: #1a202c; }
        .best .region-tag { color: #718096; }
        .best .details { color: #333; }
        .best .details b { color: #718096; }
        .best .tel-link { color: #e53e3e !important; }
        .best .dist-text { color: #007aff; }

        /* TOP 2 - 인근 기관 스타일 (차콜색으로 변경) */
        .info-box.second { border-left: 6px solid #ffcc00; }
        .second .rank-tag { background: #fff9e6; color: #cc9900; }
        /* 전체적으로 덜 눈에 띄게 차콜색 적용 */
        .second h3 { color: #555; } 
        .second .region-tag { color: #888; }
        .second .details { color: #666; }
        .second .details b { color: #999; }
        .second .tel-link { color: #777 !important; } /* 전화번호도 차콜색 계열 */
        .second .dist-text { color: #777; } /* 거리 표시도 차콜색 */

        /* [우측] 법령 섹션 (기존 스타일 유지) */
        .side-law-section { width: 420px; position: sticky; top: 25px; flex-shrink: 0; }
        .law-container { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #eef2f6; height: calc(100vh - 50px); display: flex; flex-direction: column; }
        .law-tabs { display: flex; background: #f8fafc; border-bottom: 1px solid #edf2f7; }
